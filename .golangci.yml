version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gocritic
    - bodyclose
    - errorlint
  exclusions:
    rules:
      - linters:
          - bodyclose
        path: _test\.go

formatters:
  enable:
    - gofmt
    - goimports

settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
